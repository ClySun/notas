<style>
  :root {
    --canopy: #0F1F15;
    --moss: #2A3D2A;
    --moss-light: #3a5236;
    --acid: #C2D67E;
    --acid-bright: #d4ec8a;
    --rust: #E85A2B;
    --rust-dark: #c44a1f;
    --clay: #8B7355;
    --bone: #E8E4D8;
    --bone-dim: #d4cfbe;
    --bone-bright: #f2eee2;
    --shadow: rgba(15, 31, 21, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--canopy);
    color: var(--bone);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(194, 214, 126, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(232, 90, 43, 0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 16px 80px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--moss);
    margin-bottom: 24px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--rust);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: -0.03em;
  }
  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--acid);
    letter-spacing: 0.15em; text-transform: uppercase;
    line-height: 1; margin-top: 2px;
  }
  .api-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 2px;
    cursor: pointer; transition: opacity 0.15s;
    border: none;
  }
  .api-status.connected { background: var(--moss); color: var(--acid); }
  .api-status.disconnected { background: var(--rust); color: var(--bone); }
  .api-status:hover { opacity: 0.85; }

  .sync-indicator {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 6px 8px;
    border-radius: 2px;
    line-height: 1;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }
  .sync-indicator:hover { opacity: 0.7; }
  .sync-indicator:empty { display: none; }
  .sync-indicator.synced { color: var(--acid); }
  .sync-indicator.syncing { color: var(--clay); animation: pulse 1.5s ease-in-out infinite; }
  .sync-indicator.error { color: var(--rust); }
  .sync-indicator.idle { color: var(--clay); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--moss);
    margin-bottom: 28px;
    overflow-x: auto;
    scrollbar-width: none;
  }

<body>

<div id="app">
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 100 100" width="22" height="22">
          <path d="M 22 80 L 22 22 L 38 22 L 62 60 L 62 22 L 78 22 L 78 80 L 62 80 L 38 42 L 38 80 Z" fill="#0F1F15"/>
          <rect x="22" y="48" width="16" height="3" fill="#E85A2B"/>
          <rect x="62" y="48" width="16" height="3" fill="#E85A2B"/>
          <path d="M 24 12 L 32 8 L 40 14 L 48 8 L 56 14 L 64 8 L 72 14 L 78 10" stroke="#C2D67E" stroke-width="3" fill="none" stroke-linejoin="miter"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">ÑOTAS</div>
        <div class="logo-sub">Spanish · vocab</div>
      </div>
    </div>
    <div style="display: flex; gap: 6px; align-items: center;">
      <span id="syncIndicator" class="sync-indicator" onclick="window.__notasSyncClick && window.__notasSyncClick()"></span>
      <button id="apiBtn" class="api-status disconnected">○ SET API KEY</button>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="add">Add</button>
    <button class="tab" data-tab="review">Review<span class="count" id="dueCount">[0]</span></button>
    <button class="tab" data-tab="all">All<span class="count" id="totalCount">[0]</span></button>
    <button class="tab" data-tab="stats">Stats</button>
  </nav>

  <main id="main"></main>
</div>

<script>
'use strict';

// ============= STATE =============
const state = {
  words: [],
  apiKey: '',
  syncUrl: '',
  syncStatus: 'idle',
  lastSyncedAt: 0,
  tab: 'add',
  loaded: false
};

// ============= STORAGE =============
async function storageGet(key) {
  try {
    if (window.storage) {
      const r = await window.storage.get(key);
      return r ? JSON.parse(r.value) : null;
    } else {
      const v = localStorage.getItem('notas_' + key);
      return v ? JSON.parse(v) : null;
    }
  } catch (e) { return null; }
}

async function storageSet(key, val) {
  try {
    if (window.storage) {
      await window.storage.set(key, JSON.stringify(val));
    } else {
      localStorage.setItem('notas_' + key, JSON.stringify(val));
    }
    return true;
  } catch (e) { return false; }
}

// ============= SYNC TO GOOGLE SHEET =============
let syncTimer = null;
let syncInFlight = false;
let syncPending = false;

function setSyncStatus(status) {
  state.syncStatus = status;
  const indicator = document.getElementById('syncIndicator');
  if (!indicator) return;
  indicator.className = 'sync-indicator ' + status;
  if (status === 'synced') {
    indicator.textContent = '◉ SYNCED';
    indicator.title = state.lastSyncedAt ? 'Last synced ' + new Date(state.lastSyncedAt).toLocaleString() : 'Synced';
  } else if (status === 'syncing') {
    indicator.textContent = '◌ SYNCING';
    indicator.title = 'Syncing to Google Sheets...';
  } else if (status === 'error') {
    indicator.textContent = '◯ SYNC ERROR';
    indicator.title = 'Sync failed: ' + (state.lastSyncError || 'Unknown error') + '\n\nClick to see details';
  } else if (status === 'idle' && state.syncUrl) {
    indicator.textContent = '◌ READY';
    indicator.title = 'Sync configured, ready';
  } else {
    indicator.textContent = '';
    indicator.title = '';
  }
}

async function pushToSheet() {
  if (!state.syncUrl) return false;
  if (syncInFlight) { syncPending = true; return false; }
  syncInFlight = true;
  setSyncStatus('syncing');
  try {
    const payload = {
      action: 'save',
      words: state.words,
      savedAt: Date.now()
    };
    // Use text/plain to avoid CORS preflight on Apps Script
    const res = await fetch(state.syncUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();
    if (result.status !== 'ok') throw new Error(result.error || 'Unknown error');
    state.lastSyncedAt = Date.now();
    await storageSet('lastSyncedAt', state.lastSyncedAt);
    setSyncStatus('synced');
    syncInFlight = false;
    if (syncPending) {
      syncPending = false;
      setTimeout(pushToSheet, 500);
    }
    return true;
  } catch (e) {
    setSyncStatus('error');
    syncInFlight = false;
    state.lastSyncError = e.message || String(e);
    // Use warn instead of error to avoid alarming console output for expected network blips
    console.warn('[notas] Sync skipped:', state.lastSyncError);
    return false;
  }
}

function scheduleSync() {
  if (!state.syncUrl) return;
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToSheet, 1500);
}

async function pullFromSheet() {
  if (!state.syncUrl) throw new Error('No sync URL configured');
  setSyncStatus('syncing');
  const payload = { action: 'load' };
  const res = await fetch(state.syncUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    setSyncStatus('error');
    throw new Error('HTTP ' + res.status);
  }
  const result = await res.json();
  if (result.status !== 'ok') {
    setSyncStatus('error');
    throw new Error(result.error || 'Unknown error');
  }
  setSyncStatus('synced');
  return result.words || [];
}

// ============= EXPORT / IMPORT JSON =============
function exportJson() {
  const data = {
    app: 'notas',
    version: 1,
    exportedAt: new Date().toISOString(),
    words: state.words
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'notas-backup-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function importJson(file) {
  const text = await file.text();
  const data = JSON.parse(text);
  if (!data.words || !Array.isArray(data.words)) {
    throw new Error('Invalid backup file');
  }
  return data.words;
}

// ============= SM-2 ALGORITHM =============
function sm2(card, quality) {
  let { ease = 2.5, interval = 0, reps = 0 } = card;
  if (quality < 3) {
    reps = 0;
    interval = 1;
  } else {
    if (reps === 0) interval = 1;
    else if (reps === 1) interval = 6;
    else interval = Math.round(interval * ease);
    reps += 1;
  }
  ease = ease + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  if (ease < 1.3) ease = 1.3;
  const nextDue = Date.now() + interval * 24 * 60 * 60 * 1000;
  return { ...card, ease, interval, reps, nextDue, lastReviewed: Date.now() };
}

function isDue(card) {
  if (!card.nextDue) return true;
  return card.nextDue <= Date.now();
}

// ============= CLAUDE API =============
async function callClaude(messages, systemPrompt) {
  if (!state.apiKey) throw new Error('No API key set');
  const body = {
    model: 'claude-haiku-4-5-20251001',
    max_tokens: 2000,
    messages: messages
  };
  if (systemPrompt) body.system = systemPrompt;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('API error ' + res.status + ': ' + err.slice(0, 200));
  }
  const data = await res.json();
  return data.content[0].text;
}

function extractJson(text) {
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) text = fence[1];
  const startObj = text.indexOf('{');
  const startArr = text.indexOf('[');
  let start;
  if (startObj === -1) start = startArr;
  else if (startArr === -1) start = startObj;
  else start = Math.min(startObj, startArr);
  if (start === -1) throw new Error('No JSON found in response');
  return JSON.parse(text.slice(start));
}

async function lookupWord(word) {
  const sys = `You are a Spanish dictionary assistant. Given a Spanish word or phrase, respond ONLY with valid JSON in this exact shape:
{
  "spanish": "the corrected/canonical Spanish word",
  "english": "concise English translation (under 60 chars)",
  "partOfSpeech": "noun|verb|adjective|adverb|conjunction|preposition|pronoun|interjection|phrase",
  "gender": "m|f|null (only for nouns, else null)",
  "typoSuggestion": "corrected word if input has typo, else null",
  "isVerb": true|false,
  "infinitive": "infinitive form if it's a verb, else null"
}
If the input is unclear or not Spanish, set typoSuggestion to your best guess. No other text, no markdown, just the JSON object.`;
  const text = await callClaude([{ role: 'user', content: word }], sys);
  return extractJson(text);
}

async function getConjugations(infinitive) {
  const sys = `You are a Spanish conjugation expert. Given a Spanish verb infinitive, respond ONLY with valid JSON in this shape:
{
  "infinitive": "...",

async function parseTextDump(text) {
  const sys = `You are a Spanish vocabulary parser. The user will paste text containing Spanish words/phrases (possibly mixed with English, line breaks, commas, or numbering). Extract ALL distinct Spanish vocabulary items and respond ONLY with valid JSON:
{
  "words": [
    { "spanish": "...", "english": "...", "partOfSpeech": "...", "gender": "m|f|null", "isVerb": true|false, "infinitive": "..." }
  ]

Skip duplicates. Skip pure English. Correct obvious typos. No other text, no markdown.`;
  const result = await callClaude([{ role: 'user', content: text }], sys);
  return extractJson(result);
}

// ============= DOM HELPERS =============
function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  const booleanAttrs = { disabled: 1, checked: 1, readonly: 1, required: 1, autofocus: 1, multiple: 1, hidden: 1 };
  if (attrs) {
    for (const k in attrs) {
      if (k === 'class') node.className = attrs[k];
      else if (k === 'style') node.setAttribute('style', attrs[k]);
      else if (k.startsWith('on') && typeof attrs[k] === 'function') {
        node.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k === 'html') node.innerHTML = attrs[k];
      else if (booleanAttrs[k]) {
        // Set as property, not attribute — value matters as truthy/falsy
        if (attrs[k]) node.setAttribute(k, '');
      }
      else if (attrs[k] !== false && attrs[k] != null) node.setAttribute(k, attrs[k]);
    }
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(x => x != null && node.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
    else if (typeof c === 'string' || typeof c === 'number') node.appendChild(document.createTextNode(c));
    else node.appendChild(c);
  }
  return node;
}

function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function withArticle(w) {
  const stripped = w.spanish.replace(/^(el |la |los |las )/i, '');
  if (w.gender === 'm') return 'el ' + stripped;
  if (w.gender === 'f') return 'la ' + stripped;
  return stripped;
}

function showToast(message, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = el('div', { class: 'toast' + (type === 'error' ? ' error' : '') }, message);
  document.body.appendChild(t);
  setTimeout(() => {
    t.classList.add('fade-out');
    setTimeout(() => t.remove(), 300);
  }, 2400);
}

const tenseLabels = {
  present: 'Present',
  preterite: 'Preterite',
  imperfect: 'Imperfect',
  future: 'Future',
  conditional: 'Conditional',
  presentSubjunctive: 'Present subjunctive',
  imperfectSubjunctive: 'Imperfect subjunctive'
};
const pronouns = [['yo', 'yo'], ['tu', 'tú'], ['el', 'él/ella'], ['nosotros', 'nosotros'], ['vosotros', 'vosotros'], ['ellos', 'ellos/ellas']];

function openElaborateModal(word) {
  closeModal();

  const body = el('div', { class: 'modal-body' });

  const overlay = el('div', { class: 'modal-overlay', onClick: (e) => { if (e.target === overlay) closeModal(); } },
    el('div', { class: 'modal' },
      el('div', { class: 'modal-header' },
        el('div', { style: 'flex: 1; min-width: 0;' },
          el('div', { class: 'modal-title' }, withArticle(word)),
          el('div', { class: 'modal-translation' }, word.english),
          el('div', { class: 'modal-meta' },
            word.partOfSpeech +
            (word.gender ? ' · ' + (word.gender === 'm' ? 'masculine' : 'feminine') : '') +
            (word.conjugations && word.conjugations.type ? ' · ' + word.conjugations.type : '')
          )
        ),
        el('button', { class: 'modal-close', onClick: closeModal }, '×')
      ),
      body
    )
  );
  document.body.appendChild(overlay);

  // Render content
  if (!word.isVerb) {
    let helpText = 'No conjugations — this is a ' + word.partOfSpeech + '.';
    if (word.partOfSpeech === 'noun' && word.gender) {
      helpText = 'This is a ' + (word.gender === 'm' ? 'masculine' : 'feminine') + ' noun.';
    }
    body.appendChild(el('div', { style: 'padding: 16px 0; color: var(--bone-dim); line-height: 1.6;' }, helpText));
    return;
  }

  if (!state.apiKey) {
    body.appendChild(el('div', { class: 'empty-state' }, 'API key required for conjugations'));
    return;
  }

  const renderConjugations = (data) => {
    clear(body);
    body.style.padding = '24px';
    Object.keys(tenseLabels).forEach(key => {
      const t = data.tenses && data.tenses[key];
      if (!t) return;
      const block = el('div', { class: 'tense-block' },
        el('div', { class: 'tense-label' }, tenseLabels[key]),
        el('div', { class: 'conj-grid' },
          ...pronouns.map(([k, display]) =>
            el('div', { class: 'conj-row' },
              el('span', { class: 'conj-pronoun' }, display),
              el('span', { class: 'conj-form' }, t[k] || '—')
            )
          )
        )
      );
      body.appendChild(block);
    });
    if (data.examples && data.examples.length > 0) {
      const ex = el('div', { class: 'tense-block' },
        el('div', { class: 'tense-label' }, 'Examples'),
        ...data.examples.map(e =>
          el('div', { class: 'example' },
            el('div', { class: 'example-es' }, e.es),
            el('div', { class: 'example-en' }, e.en)
          )
        )
      );
      body.appendChild(ex);
    }
  };

  if (word.conjugations) {
    renderConjugations(word.conjugations);
    return;
  }

  // Loading
  body.innerHTML = '<div class="modal-loading"><div class="pulse">LOADING CONJUGATIONS...</div></div>';

  getConjugations(word.infinitive || word.spanish)
    .then(data => {
      const idx = state.words.findIndex(w => w.id === word.id);
      if (idx >= 0) {
        state.words[idx] = { ...state.words[idx], conjugations: data };
        saveWords();
      }
      renderConjugations(data);
    })
    .catch(e => {
      clear(body);
      body.appendChild(el('div', { class: 'empty-state' }, 'Failed: ' + e.message));
    });
}

  const addBtn = el('button', { class: 'btn btn-primary', onClick: () => handleAdd() }, '[ Add ]');

  const handleAdd = async (forceWord) => {
    const word = (forceWord || addTabState.input).trim();
    if (!word) return;
    if (!state.apiKey) {
      showToast('Add API key in settings', 'error');
      openSettingsModal();
      return;
    }
    addBtn.textContent = '...';
    addBtn.disabled = true;
    input.disabled = true;
    addTabState.suggestion = null;
    try {
      const result = await lookupWord(word);
      if (result.typoSuggestion && result.typoSuggestion.toLowerCase() !== word.toLowerCase() && !forceWord) {
        addTabState.suggestion = { original: word, ...result, typoSuggestion: result.typoSuggestion };
        renderTab();
        return;
      }
      const dup = state.words.find(w => w.spanish.toLowerCase() === result.spanish.toLowerCase());
      if (dup) {
        showToast('Already in your deck');
        addTabState.input = '';
        renderTab();
        return;
      }
      state.words.push({
        id: Date.now() + Math.random(),
        spanish: result.spanish,
        english: result.english,
        partOfSpeech: result.partOfSpeech,
        gender: result.gender,
        isVerb: result.isVerb,
        infinitive: result.infinitive,
        added: Date.now(),
        ease: 2.5, interval: 0, reps: 0, nextDue: Date.now()
      });
      await saveWords();
      showToast('Added: ' + result.spanish);
      addTabState.input = '';
      renderTab();
      renderHeader();
    } catch (e) {
      showToast('Lookup failed: ' + e.message.slice(0, 60), 'error');
      addBtn.textContent = '[ Add ]';
      addBtn.disabled = false;
      input.disabled = false;
    }
  };

  main.appendChild(el('div', { class: 'section-label' }, 'Add new word or phrase'));
  main.appendChild(el('div', { class: 'input-row' }, input, addBtn));

  // Suggestion
  if (addTabState.suggestion) {
    const sug = addTabState.suggestion;
    main.appendChild(
      el('div', { class: 'suggestion' },
        el('span', null, 'Did you mean ', el('strong', null, sug.typoSuggestion || sug.spanish), '?'),
        el('div', { class: 'suggestion-actions' },
          el('button', {
            class: 'btn btn-primary',
            onClick: () => { addTabState.input = sug.typoSuggestion || sug.spanish; renderTab(); handleAdd(sug.typoSuggestion || sug.spanish); }
          }, 'Use'),
          el('button', {
            class: 'btn btn-ghost',
            onClick: async () => {
              state.words.push({
                id: Date.now() + Math.random(),
                spanish: sug.original,
                english: sug.english + ' (unverified)',
                partOfSpeech: sug.partOfSpeech,
                gender: sug.gender,
                isVerb: sug.isVerb,
                infinitive: sug.infinitive,
                added: Date.now(),
                ease: 2.5, interval: 0, reps: 0, nextDue: Date.now()
              });
              await saveWords();
              showToast('Added: ' + sug.original);
              addTabState.input = '';
              addTabState.suggestion = null;
              renderTab();
              renderHeader();
            }
          }, 'Keep "' + sug.original + '"')
        )
      )
    );
  }

  // Import buttons
  const fileInput = el('input', {
    type: 'file',
    class: 'file-input',
    accept: '.txt,.md,.csv',
    onChange: async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const text = await file.text();
      addTabState.bulkInput = text;
      addTabState.showBulk = true;
      e.target.value = '';
      renderTab();
    }
  });

  main.appendChild(
    el('div', { class: 'import-actions' },
      el('button', {
        class: 'btn btn-ghost',
        onClick: () => { addTabState.showBulk = !addTabState.showBulk; renderTab(); }
      }, addTabState.showBulk ? '× Cancel bulk' : '≡ Bulk paste'),
      el('button', { class: 'btn btn-ghost', onClick: () => fileInput.click() }, '↑ Import file'),
      fileInput
    )
  );

  // Bulk
  if (addTabState.showBulk) {
    const bulkInput = el('textarea', {
      class: 'input-field',
      placeholder: 'Paste any text — class notes, mixed list, anything. Claude will extract the Spanish words.',
      onInput: (e) => { addTabState.bulkInput = e.target.value; }
    });
    bulkInput.value = addTabState.bulkInput;

    const parseBtn = el('button', {
      class: 'btn btn-primary',
      onClick: async () => {
        if (!addTabState.bulkInput.trim()) return;
        if (!state.apiKey) {
          showToast('Add API key in settings', 'error');
          openSettingsModal();
          return;
        }
        parseBtn.textContent = '[ Parsing... ]';
        parseBtn.disabled = true;
        try {
          const result = await parseTextDump(addTabState.bulkInput);
          addTabState.parsed = result.words || [];
          renderTab();
        } catch (e) {
          showToast('Parsing failed: ' + e.message.slice(0, 60), 'error');
          parseBtn.textContent = '[ Parse with Claude ]';
          parseBtn.disabled = false;
        }
      }
    }, '[ Parse with Claude ]');

    main.appendChild(el('div', { style: 'margin-top: 16px;' },
      el('div', { class: 'section-label', style: 'margin-top: 16px;' }, 'Paste vocabulary list'),
      bulkInput,
      el('div', { style: 'margin-top: 8px; display: flex; gap: 8px;' }, parseBtn)
    ));

    if (addTabState.parsed) {
      const preview = addTabState.parsed.slice(0, 20);
      const result = el('div', { class: 'parsing-result' },
        el('h4', null, 'Found ' + addTabState.parsed.length + ' words — preview'),
        ...preview.map(p =>
          el('div', { class: 'parsed-word' },
            el('span', { class: 'parsed-word-es' }, p.spanish),
            el('span', { class: 'parsed-word-en' }, p.english)
          )
        ),
        addTabState.parsed.length > 20 ? el('div', { style: 'font-family: JetBrains Mono; font-size: 11px; color: var(--clay); text-align: center; padding: 8px 0; letter-spacing: 0.1em;' }, '+ ' + (addTabState.parsed.length - 20) + ' MORE') : null,
        el('div', { style: 'margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end;' },
          el('button', {
            class: 'btn btn-ghost',
            onClick: () => { addTabState.parsed = null; renderTab(); }
          }, 'Discard'),
          el('button', {
            class: 'btn btn-primary',
            onClick: async () => {
              let added = 0, skipped = 0;
              for (const p of addTabState.parsed) {
                const dup = state.words.find(w => w.spanish.toLowerCase() === p.spanish.toLowerCase());
                if (dup) { skipped++; continue; }
                state.words.push({
                  id: Date.now() + Math.random() + added,
                  spanish: p.spanish,
                  english: p.english,
                  partOfSpeech: p.partOfSpeech,
                  gender: p.gender,
                  isVerb: p.isVerb,
                  infinitive: p.infinitive,
                  added: Date.now() + added,
                  ease: 2.5, interval: 0, reps: 0, nextDue: Date.now()
                });
                added++;
              }
              await saveWords();
              showToast('Imported ' + added + ' words' + (skipped ? ' (' + skipped + ' duplicates)' : ''));
              addTabState.bulkInput = '';
              addTabState.parsed = null;
              addTabState.showBulk = false;
              renderTab();
              renderHeader();
            }
          }, 'Import all')
        )
      );
      main.appendChild(result);
    }
  }

  // Recent
  const recent = [...state.words].sort((a, b) => b.added - a.added).slice(0, 8);
  main.appendChild(el('div', { style: 'margin-top: 32px;' },
    el('div', { class: 'section-label' }, 'Recently added'),
    recent.length === 0
      ? el('div', { class: 'empty-state' }, 'No words yet — add your first above')
      : el('div', { class: 'word-list' },
          ...recent.map(w => buildWordCard(w))
        )
  ));
}

function buildWordCard(w, opts) {
  opts = opts || {};
  const card = el('div', { class: 'word-card', onClick: () => openElaborateModal(w) },
    el('div', { class: 'word-card-content' },
      el('div', { class: 'word-card-spanish' }, withArticle(w)),
      el('div', { class: 'word-card-english' }, w.english),
      el('div', { class: 'word-card-meta' },
        w.partOfSpeech +
        (w.gender ? ' · ' + w.gender : '') +
        (opts.showReps ? ' · REPS ' + String(w.reps || 0).padStart(2, '0') : '') +
        (opts.showDue && isDue(w) ? ' · ' : '')
      )
    ),
    opts.deletable
      ? el('button', {
          class: 'icon-btn',
          title: 'Delete',
          onClick: (e) => {
            e.stopPropagation();
            if (confirm('Delete "' + w.spanish + '"?')) {
              state.words = state.words.filter(x => x.id !== w.id);
              saveWords();
              renderTab();
              renderHeader();
            }
          }
        }, '×')
      : el('button', {
          class: 'btn btn-ghost',
          style: 'padding: 6px 10px; font-size: 10px;',
          onClick: (e) => { e.stopPropagation(); openElaborateModal(w); }
        }, 'Elaborate →')
  );

  if (opts.showDue && isDue(w)) {
    card.querySelector('.word-card-meta').appendChild(
      el('span', { style: 'color: var(--rust);' }, 'DUE')
    );
  }
  return card;
}

// ============= REVIEW TAB =============
let reviewState = { queue: [], idx: 0, flipped: false, swiping: null, touchStart: null, touchDelta: 0 };

function renderReviewTab() {
  // Build queue once per render entry
  reviewState.queue = state.words.filter(isDue).sort((a, b) => (a.nextDue || 0) - (b.nextDue || 0));

  if (reviewState.queue.length === 0) {
    main.appendChild(el('div', { class: 'review-finished' },
      el('h2', null, 'Nothing due'),
      el('p', null, 'Come back later or add new words to study.')
    ));
    return;
  }

  if (reviewState.idx >= reviewState.queue.length) {
    main.appendChild(el('div', { class: 'review-finished' },
      el('h2', null, 'Done!'),
      el('p', null, 'You reviewed ' + reviewState.queue.length + ' card' + (reviewState.queue.length === 1 ? '' : 's') + '. Solid work.'),
      el('button', {
        class: 'btn btn-primary',
        onClick: () => { reviewState.idx = 0; reviewState.flipped = false; renderTab(); renderHeader(); }
      }, '[ Reload ]')
    ));
    return;
  }

  const card = reviewState.queue[reviewState.idx];

  const handleAnswer = async (quality) => {
    const updated = sm2(card, quality);
    const idx = state.words.findIndex(w => w.id === card.id);
    if (idx >= 0) state.words[idx] = { ...state.words[idx], ...updated };
    await saveWords();
    reviewState.swiping = quality < 3 ? 'left' : 'right';
    renderTab();
    setTimeout(() => {
      reviewState.swiping = null;
      reviewState.flipped = false;
      reviewState.idx += 1;
      renderTab();
      renderHeader();
    }, 400);
  };

  const forgotBtn = el('button', { class: 'btn btn-rust', onClick: () => handleAnswer(0) }, 'FORGOT');
  const rememberBtn = el('button', { class: 'btn btn-primary', onClick: () => handleAnswer(4) }, 'REMEMBER');

  const flashcard = el('div', {
    class: 'flashcard' + (reviewState.flipped ? ' flipped' : '') + (reviewState.swiping ? ' swiping-' + reviewState.swiping : ''),
    onClick: () => {
      if (reviewState.swiping) return;
      reviewState.flipped = !reviewState.flipped;
      flashcard.classList.toggle('flipped');
    }
  });

  const inner = el('div', { class: 'flashcard-inner' },
    el('div', { class: 'flashcard-face' },
      el('div', { class: 'flashcard-meta' },
        card.partOfSpeech + (card.gender ? ' · ' + card.gender : '') + ' // REPS ' + String(card.reps || 0).padStart(2, '0')),
      el('div', { class: 'flashcard-word' }, withArticle(card)),
      el('div', { class: 'flashcard-hint' }, 'tap to flip · space')
    ),
    el('div', { class: 'flashcard-face back' },
      el('div', { class: 'flashcard-meta dark' }, 'TRANSLATION'),
      el('div', null,
        el('div', { class: 'flashcard-word back-word' }, card.english),
        el('div', { class: 'flashcard-accent' }),
        el('div', { class: 'flashcard-translation' }, withArticle(card))
      ),
      el('div', { class: 'flashcard-hint' }, 'swipe ← forgot · → remember')
    )
  );
  flashcard.appendChild(inner);

  // Touch swipe
  flashcard.addEventListener('touchstart', (e) => { reviewState.touchStart = e.touches[0].clientX; }, { passive: true });
  flashcard.addEventListener('touchmove', (e) => {
    if (reviewState.touchStart === null) return;
    reviewState.touchDelta = e.touches[0].clientX - reviewState.touchStart;
    if (Math.abs(reviewState.touchDelta) > 10) {
      inner.style.transform = 'translateX(' + reviewState.touchDelta + 'px) rotate(' + (reviewState.touchDelta * 0.05) + 'deg)';
      inner.style.transition = 'none';
    }
  }, { passive: true });
  flashcard.addEventListener('touchend', () => {
    if (reviewState.touchStart === null) return;
    if (Math.abs(reviewState.touchDelta) > 100) {
      handleAnswer(reviewState.touchDelta < 0 ? 0 : 4);
    } else {
      inner.style.transform = '';
      inner.style.transition = '';
    }
    reviewState.touchStart = null;
    reviewState.touchDelta = 0;
  });

  const container = el('div', { class: 'review-container' },
    el('div', { class: 'review-progress' },
      el('span', { class: 'current' }, '[ ' + String(reviewState.idx + 1).padStart(2, '0') + ' / ' + String(reviewState.queue.length).padStart(2, '0') + ' ]'),
      el('span', { class: 'total' }, 'DUE TODAY')
    ),
    el('div', { class: 'review-progress-bar' },
      el('div', { class: 'review-progress-fill', style: 'width: ' + ((reviewState.idx / reviewState.queue.length) * 100) + '%;' })
    ),
    flashcard,
    el('div', { class: 'review-actions' }, forgotBtn, rememberBtn),
    el('div', { style: 'margin-top: 16px;' },
      el('button', {
        class: 'btn btn-ghost',
        style: 'padding: 6px 12px; font-size: 10px;',
        onClick: () => openElaborateModal(card)
      }, 'Elaborate this word →')
    )
  );

  main.appendChild(container);
}

// Keyboard shortcuts for review
document.addEventListener('keydown', (e) => {
  if (state.tab !== 'review') return;
  if (document.querySelector('.modal-overlay')) return;
  const card = reviewState.queue && reviewState.queue[reviewState.idx];
  if (!card) return;
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!reviewState.flipped) {
      reviewState.flipped = true;
      const fc = document.querySelector('.flashcard');
      if (fc) fc.classList.add('flipped');
    }
  } else if (e.key === '1' || e.key === 'ArrowLeft') {
    handleReviewAnswer(0);
  } else if (e.key === '2' || e.key === 'ArrowRight') {
    handleReviewAnswer(4);
  }
});

async function handleReviewAnswer(quality) {
  const card = reviewState.queue[reviewState.idx];
  if (!card) return;
  const updated = sm2(card, quality);
  const idx = state.words.findIndex(w => w.id === card.id);
  if (idx >= 0) state.words[idx] = { ...state.words[idx], ...updated };
  await saveWords();
  reviewState.swiping = quality < 3 ? 'left' : 'right';
  renderTab();
  setTimeout(() => {
    reviewState.swiping = null;
    reviewState.flipped = false;
    reviewState.idx += 1;
    renderTab();
    renderHeader();
  }, 400);
}

// ============= ALL TAB =============
let allTabState = { search: '', sort: 'added' };

function renderAllTab() {
  const search = el('input', {
    type: 'text',
    class: 'input-field',
    value: allTabState.search,
    placeholder: 'Search...',
    onInput: (e) => { allTabState.search = e.target.value; renderAllList(); }
  });

  const filterRow = el('div', { class: 'filter-row' },
    ...['added', 'alpha', 'due'].map(k =>
      el('button', {
        class: 'btn ' + (allTabState.sort === k ? 'btn-primary' : 'btn-ghost'),
        onClick: () => { allTabState.sort = k; renderTab(); }
      }, k === 'added' ? 'Newest' : k === 'alpha' ? 'A → Z' : 'Due first')
    )
  );

  const listContainer = el('div', { id: 'allList' });

  const renderAllList = () => {
    clear(listContainer);
    const filtered = state.words.filter(w =>
      w.spanish.toLowerCase().includes(allTabState.search.toLowerCase()) ||
      w.english.toLowerCase().includes(allTabState.search.toLowerCase())
    );
    const sorted = [...filtered].sort((a, b) => {
      if (allTabState.sort === 'added') return b.added - a.added;
      if (allTabState.sort === 'alpha') return a.spanish.localeCompare(b.spanish);
      if (allTabState.sort === 'due') return (a.nextDue || 0) - (b.nextDue || 0);
      return 0;
    });

    if (sorted.length === 0) {
      listContainer.appendChild(el('div', { class: 'empty-state' }, 'No cards yet'));
    } else {
      const list = el('div', { class: 'word-list' });
      sorted.forEach(w => list.appendChild(buildWordCard(w, { deletable: true, showReps: true, showDue: true })));
      listContainer.appendChild(list);
    }
  };

  main.appendChild(el('div', { class: 'section-label' }, 'All cards · ' + state.words.length));
  main.appendChild(el('div', { class: 'input-row' }, search));
  main.appendChild(filterRow);
  main.appendChild(listContainer);
  renderAllList();
}

// ============= STATS TAB =============
function renderStatsTab() {
  const total = state.words.length;
  const due = state.words.filter(isDue).length;
  const learned = state.words.filter(w => (w.reps || 0) >= 3).length;
  const newCards = state.words.filter(w => (w.reps || 0) === 0).length;
  const verbs = state.words.filter(w => w.isVerb).length;
  const nouns = state.words.filter(w => w.partOfSpeech === 'noun').length;
  const others = total - verbs - nouns;
  const week = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const reviewedThisWeek = state.words.filter(w => w.lastReviewed && w.lastReviewed > week).length;
  const avgEase = total > 0 ? (state.words.reduce((s, w) => s + (w.ease || 2.5), 0) / total).toFixed(2) : '—';

  const statCard = (label, value, sub, variant) => el('div', { class: 'stat-card ' + (variant || '') },
    el('div', { class: 'stat-label' }, label),
    el('div', { class: 'stat-value' }, String(value)),
    sub ? el('div', { class: 'stat-sub' }, sub) : null
  );

  main.appendChild(el('div', { class: 'section-label' }, 'Overview'));
  main.appendChild(el('div', { class: 'stats-grid' },
    statCard('Total cards', total),
    statCard('Due now', due, null, 'rust'),
    statCard('Learned', learned, '3+ successful reps'),
    statCard('New', newCards, 'Never reviewed', 'clay')
  ));

  main.appendChild(el('div', { class: 'section-label' }, 'Breakdown'));
  main.appendChild(el('div', { class: 'stats-grid' },
    statCard('Verbs', verbs, null, 'clay'),
    statCard('Nouns', nouns, null, 'clay'),
    statCard('Other', others, null, 'clay')
  ));

  main.appendChild(el('div', { class: 'section-label' }, 'Activity'));
  main.appendChild(el('div', { class: 'stats-grid' },
    statCard('Reviewed (7d)', reviewedThisWeek),
    statCard('Avg ease', avgEase, 'SM-2 difficulty')
  ));
}

// ============= HEADER & TABS =============
function renderHeader() {
  const dueCount = state.words.filter(isDue).length;
  document.getElementById('dueCount').textContent = '[' + dueCount + ']';
  document.getElementById('totalCount').textContent = '[' + state.words.length + ']';
  const apiBtn = document.getElementById('apiBtn');
  if (state.apiKey) {
    apiBtn.className = 'api-status connected';
    apiBtn.textContent = '● API CONNECTED';
  } else {
    apiBtn.className = 'api-status disconnected';
    apiBtn.textContent = '○ SET API KEY';
  }
}

async function saveWords() {
  await storageSet('words', state.words);
  scheduleSync();
}

// ============= INIT =============
async function init() {
  document.getElementById('apiBtn').addEventListener('click', openSettingsModal);

  // Sync indicator click — show error or retry
  window.__notasSyncClick = () => {
    if (state.syncStatus === 'error' && state.lastSyncError) {
      if (confirm('Sync error:\n\n' + state.lastSyncError + '\n\nRetry now?')) {
        pushToSheet();
      }
    } else if (state.syncUrl) {
      pushToSheet();
      showToast('Syncing...');
    } else {
      openSettingsModal();
    }
  };

  document.getElementById('tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    state.tab = btn.dataset.tab;
    if (state.tab === 'review') {
      reviewState.idx = 0;
      reviewState.flipped = false;
    }
    renderTab();
  });

  // Load
  const w = await storageGet('words');
  const k = await storageGet('apiKey');
  const u = await storageGet('syncUrl');
  const ls = await storageGet('lastSyncedAt');
  if (Array.isArray(w)) state.words = w;
  if (typeof k === 'string') state.apiKey = k;
  if (typeof u === 'string') state.syncUrl = u;
  if (typeof ls === 'number') state.lastSyncedAt = ls;
  state.loaded = true;

  renderHeader();
  if (state.syncUrl) setSyncStatus('idle');
  renderTab();
}

init().catch(e => {
  document.getElementById('main').innerHTML =
    '<div class="empty-state" style="color: var(--rust);">FAILED TO INITIALIZE: ' + (e.message || 'unknown') + '</div>';
  console.error(e);
});
</script>
